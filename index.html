<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>レシピ・アイテム検索</title>
</head>
<body>
    <h2>レシピ検索（例：境懐ノ無銘改）</h2>
    <input type="text" id="recipeInput" placeholder="レシピ名を入力">
    <input type="number" id="countInput" value="1" min="1">
    <button onclick="calculateMaterials()">計算</button>
    <pre id="output"></pre>

    <hr>

    <h2>アイテム逆引き検索</h2>
    <input type="text" id="itemSearchBox" placeholder="アイテム名を入力">
    <button onclick="searchItem()">検索</button>
    <div id="itemResult" style="white-space: pre-wrap;"></div>

    <script src="script.js"></script>
</body>
</html>
