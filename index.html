<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>武器製作Wiki - 必要素材計算</title>
    <style>
        body { font-family: monospace; padding: 20px; background-color: #1e1e1e; color: #d4d4d4; line-height: 1.6; }
        .console-area { background: #000; border: 1px solid #444; padding: 20px; border-radius: 5px; max-width: 600px; margin: 0 auto; }
        .input-line { margin-bottom: 15px; border-bottom: 1px solid #333; padding-bottom: 10px; }
        input { background: #000; color: #00ff00; border: 1px solid #555; padding: 5px; font-family: monospace; width: 150px; }
        button { cursor: pointer; background: #444; color: white; border: none; padding: 10px 20px; transition: 0.2s; border-radius: 4px; }
        button:hover { background: #666; }
        #output { margin-top: 20px; white-space: pre-wrap; color: #ffffff; min-height: 50px; }
        .label { color: #aaa; }
    </style>
</head>
<body>

<div class="console-area">

    <!-- 素材計算 -->
    <div class="input-line">
        <span class="label">レシピ名を入力してください: </span>
        <input type="text" id="recipeInput" placeholder="例: 無銘改">
    </div>

    <div class="input-line">
        <span class="label">何本作りますか？: </span>
        <input type="number" id="countInput" value="1" min="1">
    </div>

    <button onclick="calculateMaterials()">計算実行</button>

    <div id="output">ここに出力されます</div>

    <hr>

    <!-- アイテム検索 -->
    <h2>アイテム検索</h2>

    <input id="itemSearchBox" placeholder="IDや名前で検索">
    <button onclick="searchItem()">検索</button>

    <p id="itemResult"></p>

</div>

<script>
/* ===============================
   レシピデータ
================================ */
const recipes = [
    {
        name: "無銘改",
        items: [
            { name: "境壊ノ二刀無銘", count: 1 },
            { name: "焔獄魔の逆鱗", count: 30 },
            { name: "焔獄魔の巌翼", count: 20 },
            { name: "冰刃魔の逆鱗", count: 30 },
            { name: "冰刃魔の巌翼", count: 20 },
            { name: "雷霆魔の逆鱗", count: 30 },
            { name: "雷霆魔の巌翼", count: 20 },
            { name: "百足の卵", count: 50 },
            { name: "百足の毒", count: 20 },
            { name: "朱の盤の角", count: 50 },
            { name: "乾いた舌", count: 20 },
            { name: "斬鋭石", count: 50 },
            { name: "剛毅石", count: 50 },
            { name: "霊妙石", count: 50 },
            { name: "穢珠", count: 30 }
        ]
    },
    { name: "無銘", items: [] },
    { name: "真打", items: [] }
];

/* ===============================
   アイテムIDデータ
================================ */
const itemData = {
    "item_001": "白",
    "item_002": "黒",
    "item_003": "赤"
};

/* ===============================
   素材計算
================================ */
function calculateMaterials() {
    const recipeName = document.getElementById('recipeInput').value.trim();
    const makeCount = parseInt(document.getElementById('countInput').value) || 1;
    const outputDiv = document.getElementById('output');

    const target = recipes.find(r => r.name === recipeName);

    if (!target) {
        outputDiv.innerText = "【エラー】\nそのレシピは存在しません";
        outputDiv.style.color = "#ff6b6b";
        return;
    }

    outputDiv.style.color = "#ffffff";
    let result = `\n【必要素材（${makeCount}本分）】\n`;

    if (!target.items.length) {
        result += "素材情報なし";
    } else {
        target.items.forEach(m => {
            result += ` - ${m.name} × ${m.count * makeCount}\n`;
        });
    }

    outputDiv.innerText = result;
}

/* ===============================
   アイテム検索（部分一致対応）
================================ */
function searchItem() {
    const keyword = document.getElementById("itemSearchBox").value;
    let results = [];

    for (let key in itemData) {
        if (key.includes(keyword) || itemData[key].includes(keyword)) {
            results.push(key + " → " + itemData[key]);
        }
    }

    document.getElementById("itemResult").innerText =
        results.length ? results.join("\n") : "見つかりません";
}
</script>

</body>
</html>
