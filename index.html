<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>武器製作Wiki</title>
    <style>
        body { font-family: sans-serif; padding: 20px; line-height: 1.6; }
        .recipe-card { border: 1px solid #ccc; padding: 15px; margin-top: 20px; border-radius: 8px; }
        .material-list { color: #555; }
    </style>
</head>
<body>
    <h1>武器製作レシピ検索</h1>
    <input type="text" id="searchInput" placeholder="レシピ名を入力（例：無名改）">
    <button onclick="searchRecipe()">検索</button>

    <div id="result"></div>

    <script>
        // JavaのRecipeリストに相当するデータ
        const recipes = [
            {
                name: "無名改",
                damage: 3,
                attribute: 4,
                materials: [
                    { name: "境壊ノ二刀無名", count: 1 },
                    { name: "焔獄魔の逆鱗", count: 30 },
                    { name: "焔獄魔の巌翼", count: 20 },
                    // ...以下、素材を追加
                    { name: "穢珠", count: 30 }
                ]
            },
            { name: "真打", damage: 10, attribute: 5, materials: [] },
            { name: "修羅", damage: 15, attribute: 0, materials: [] }
        ];

        function searchRecipe() {
            const input = document.getElementById('searchInput').value;
            const resultDiv = document.getElementById('result');
            resultDiv.innerHTML = ""; // 前の結果をクリア

            const found = recipes.find(r => r.name === input);

            if (found) {
                let html = `
                    <div class="recipe-card">
                        <h2>${found.name}</h2>
                        <p>ステータス: ダメージ ${found.damage} / 属性 ${found.attribute}</p>
                        <h3>必要素材:</h3>
                        <ul class="material-list">
                `;
                
                if (found.materials.length === 0) {
                    html += "<li>なし</li>";
                } else {
                    found.materials.forEach(m => {
                        html += `<li>${m.name} × ${m.count}</li>`;
                    });
                }

                html += `</ul></div>`;
                resultDiv.innerHTML = html;
            } else {
                resultDiv.innerHTML = "<p>そのレシピは存在しません</p>";
            }
        }
    </script>
</body>
</html>
